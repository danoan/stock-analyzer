<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analyzer</title>
<style>
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface2: #f3f4f6;
    --border: #e5e7eb;
    --text: #111827;
    --text-dim: #6b7280;
    --accent: #2563eb;
    --accent-h: #1d4ed8;
    --r: 8px;
    --sh: 0 1px 3px rgba(0,0,0,.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* Topnav */
  .topnav {
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--sh);
  }
  .topnav .brand {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text);
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem;
  }

  .page-header {
    margin-bottom: 2rem;
  }
  .page-header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }
  .page-header p {
    color: var(--text-dim);
    margin-top: 0.35rem;
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.25rem;
  }

  .card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    border-radius: var(--r);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1.5rem;
    box-shadow: var(--sh);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    height: 100%;
  }

  .card-link:hover .card {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,.1);
  }

  .card-icon {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .card-body {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .card-name {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--text);
  }

  .card-port {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: 'SFMono-Regular', Consolas, monospace;
  }

  .card-desc {
    font-size: 0.88rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
</style>
</head>
<body>

<nav class="topnav">
  <span class="brand">Stock Analyzer</span>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Services</h1>
    <p>Select a service to open it in your browser.</p>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
  const services = [
    {
      name: 'API Explorer',
      url: 'http://api-explorer.barriguinhas.fr',
      desc: 'Browse and test the yfinance API. Acts as a caching proxy — responses are stored locally to avoid repeated network calls.',
      icon: `<svg class="card-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#eff6ff"/>
        <rect x="10" y="13" width="28" height="22" rx="3" stroke="#2563eb" stroke-width="2" fill="none"/>
        <path d="M10 18h28" stroke="#2563eb" stroke-width="2"/>
        <circle cx="14" cy="15.5" r="1.2" fill="#2563eb"/>
        <circle cx="18" cy="15.5" r="1.2" fill="#2563eb"/>
        <circle cx="22" cy="15.5" r="1.2" fill="#2563eb"/>
        <path d="M16 24l4 3-4 3" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M24 30h8" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round"/>
      </svg>`
    },
    {
      name: 'Data Ingestor',
      url: 'http://data-ingestor.barriguinhas.fr',
      desc: 'Fetch historical price and fundamental data from yfinance and load it into PostgreSQL for analysis and dashboards.',
      icon: `<svg class="card-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#f0fdf4"/>
        <ellipse cx="24" cy="16" rx="11" ry="4.5" stroke="#16a34a" stroke-width="2" fill="none"/>
        <path d="M13 16v8c0 2.5 4.9 4.5 11 4.5s11-2 11-4.5v-8" stroke="#16a34a" stroke-width="2" fill="none"/>
        <path d="M13 24v8c0 2.5 4.9 4.5 11 4.5s11-2 11-4.5v-8" stroke="#16a34a" stroke-width="2" fill="none"/>
        <path d="M24 8v7M21 11l3-3 3 3" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`
    },
    {
      name: 'Stock Ranker',
      url: 'http://stock-ranker.barriguinhas.fr',
      desc: 'Build scoring models and rank stocks by custom criteria. Evaluate the best stocks following quantitative criteria.',
      icon: `<svg class="card-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#faf5ff"/>
        <path d="M20 10h-6a2 2 0 0 0-2 2v24a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V10h-6" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <path d="M20 10h8v4H20v-4z" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <path d="M16 22h16M16 27h10M16 32h12" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="32" cy="33" r="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
        <path d="M32 30v3.5l2 1.5" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`
    },
    {
      name: 'Fundascope',
      url: 'http://fundascope.barriguinhas.fr',
      desc: 'Analyse income statements, balance sheets, and cash flows. Includes a health scorecard and AI-powered financial chat.',
      icon: `<svg class="card-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#fff7ed"/>
        <path d="M12 34l8-9 6 5 8-13" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="34" cy="20" r="7" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
        <path d="M39.5 25.5l3.5 3.5" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
        <circle cx="34" cy="20" r="3.5" fill="#fed7aa"/>
      </svg>`
    },
    {
      name: 'Metabase',
      url: 'http://metabase.barriguinhas.fr',
      desc: 'BI dashboards and ad-hoc queries directly over the PostgreSQL database. Visualise trends, build charts, share reports.',
      icon: `<svg class="card-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#fef2f2"/>
        <rect x="11" y="26" width="6" height="10" rx="1.5" fill="#dc2626"/>
        <rect x="21" y="20" width="6" height="16" rx="1.5" fill="#dc2626"/>
        <rect x="31" y="13" width="6" height="23" rx="1.5" fill="#dc2626"/>
        <path d="M10 36h28" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
      </svg>`
    },
  ];

  const grid = document.getElementById('grid');

  services.forEach(({ name, url, desc, icon }) => {
    const a = document.createElement('a');
    a.className = 'card-link';
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="card">
        ${icon}
        <div class="card-body">
          <div class="card-name">${name}</div>
          <div class="card-desc">${desc}</div>
        </div>
      </div>`;
    grid.appendChild(a);
  });
</script>
</body>
</html>
