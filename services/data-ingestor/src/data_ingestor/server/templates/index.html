{% extends "base.html" %}
{% block title_suffix %} — Step 1: Source{% endblock %}

{% block steps %}
<div class="step-bar mb-4">
  <div class="step-node step-active"><div class="step-circle">1</div><span class="step-label"><a href="/" style="color:inherit">Source</a></span></div>
  <div class="step-line"></div>
  <div class="step-node step-pending"><div class="step-circle">2</div><span class="step-label">Preview &amp; Map</span></div>
  <div class="step-line"></div>
  <div class="step-node step-pending"><div class="step-circle">3</div><span class="step-label">Result</span></div>
</div>
{% endblock %}

{% block content %}
<div class="card" style="max-width:540px;margin:0 auto">
  <div class="card-header">Step 1 — Configure Data Source</div>
  <div class="card-body">
    <form method="post" action="/preview">
      <div class="form-group">
        <label for="api_url" class="form-label">API Explorer URL</label>
        <input type="url" class="form-input" id="api_url" name="api_url"
               value="{{ api_url }}" required>
      </div>
      <div class="form-group">
        <label for="ticker" class="form-label">Ticker</label>
        <input type="text" class="form-input" id="ticker" name="ticker"
               placeholder="e.g. AAPL" required>
      </div>
      <div class="form-group">
        <label for="method" class="form-label">Method</label>
        <select class="form-input" id="method" name="method" required>
          {% for m in methods %}
          <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" id="period-group" style="display:none">
        <label for="period" class="form-label">Period</label>
        <select class="form-input" id="period" name="period">
          <option value="1d">1d</option>
          <option value="5d">5d</option>
          <option value="1mo" selected>1mo</option>
          <option value="3mo">3mo</option>
          <option value="6mo">6mo</option>
          <option value="1y">1y</option>
          <option value="2y">2y</option>
          <option value="5y">5y</option>
          <option value="10y">10y</option>
          <option value="ytd">ytd</option>
          <option value="max">max</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" id="force_refresh" name="force_refresh" value="1">
          Force refresh (bypass cache)
        </label>
      </div>
      <button type="submit" class="btn btn-primary">Fetch &amp; Preview →</button>
    </form>
  </div>
</div>
<script>
(function () {
  const methodSelect = document.getElementById('method');
  const periodGroup = document.getElementById('period-group');
  function toggle() {
    periodGroup.style.display = methodSelect.value === 'history' ? '' : 'none';
  }
  methodSelect.addEventListener('change', toggle);
  toggle();
})();
</script>
{% endblock %}
